<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Python教学专用登录页</title>
</head>
<body>
    <h2>学生练习登录系统</h2>
    <!-- 账号输入框 -->
    <input type="text" id="username" placeholder="请输入账号"><br/><br/>
    <!-- 密码输入框 -->
    <input type="password" id="password" placeholder="请输入密码"><br/><br/>
    <!-- 登录按钮 -->
    <button id="loginBtn" onclick="alert('登录成功！')">登录</button>
</body>
</html>
